<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리서치 다이내믹 배너 메이커</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 왼쪽: 폼 영역 -->
        <aside class="editor-panel">
            <header>
                <h1>배너 제작</h1>
                <p>정보를 입력하면 실시간으로 배너에 반영됩니다.</p>
            </header>
            
            <form id="banner-form">
                <div class="form-group">
                    <label for="title">리서치 제목</label>
                    <input type="text" id="title" placeholder="예: UI/UX 사용성 테스트 참가자 모집" value="UI/UX 사용성 테스트 참가자 모집">
                </div>
                
                <div class="form-group">
                    <label for="reward">참여 보상</label>
                    <input type="text" id="reward" placeholder="예: 50,000원" value="50,000원">
                </div>
                
                <div class="form-group">
                    <label for="target">모집 대상</label>
                    <input type="text" id="target" placeholder="예: 20~30대 서비스 기획자 및 디자이너" value="20~30대 서비스 기획자 및 디자이너">
                </div>
                
                <div class="form-group">
                    <label for="date">일정</label>
                    <input type="text" id="date" placeholder="예: 2026.03.20 ~ 2026.03.25" value="2026.03.20 ~ 2026.03.25">
                </div>
                
                <div class="form-group">
                    <label for="theme-color">테마 색상</label>
                    <input type="color" id="theme-color" value="#4F46E5">
                </div>
            </form>
        </aside>

        <!-- 오른쪽: 캔버스/미리보기 영역 -->
        <main class="preview-panel">
            <div class="canvas-container">
                <div id="banner-canvas" class="banner-canvas">
                    <div class="banner-header">
                        <span class="badge" id="preview-badge">리서치 참여자 모집</span>
                    </div>
                    
                    <div class="banner-body">
                        <h2 id="preview-title" class="preview-title">UI/UX 사용성 테스트 참가자 모집</h2>
                        
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">대상</span>
                                <span id="preview-target" class="info-value">20~30대 서비스 기획자 및 디자이너</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">일정</span>
                                <span id="preview-date" class="info-value">2026.03.20 ~ 2026.03.25</span>
                            </div>
                            <div class="info-item reward-highlight">
                                <span class="info-label">보상</span>
                                <strong id="preview-reward" class="info-value">50,000원</strong>
                            </div>
                        </div>
                    </div>
                    
                    <div class="banner-footer">
                        <div class="cta-button">지원하기</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
